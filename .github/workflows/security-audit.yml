name: Dependency audit

# Separate from tests.yml on purpose: that workflow answers "does the code
# work", this one answers "do our dependencies have known CVEs" -- caught
# a real one (25 Pillow advisories) the first time this ran locally.
on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "45 3 * * 1"

jobs:
  security-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements.txt
      - name: pip-audit
        run: |
          pip install pip-audit
          pip-audit -r requirements.txt
      - uses: actions/setup-node@v7
        with:
          node-version: "22"
          cache: "npm"
      - name: npm audit
        run: npm audit --audit-level=high
