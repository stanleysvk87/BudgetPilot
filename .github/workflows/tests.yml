name: Tests

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  unittest:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Compile main entry points
        run: python -m py_compile budgetpilot.py budgetpilot_web.py first_run_wizard.py

      - name: Run unit tests
        run: python -m unittest discover -s tests

      - name: Set up Node
        uses: actions/setup-node@v7
        with:
          node-version: "22"
          cache: "npm"

      - name: Install browser test dependencies
        run: |
          npm ci
          npx playwright install --with-deps chromium

      - name: Run Chromium end-to-end tests
        run: npm run test:e2e

      - name: Run Chromium visual review
        run: npm run review:chromium

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Build Docker image
        run: docker build -t budgetpilot:ci .
